# SPDX-License-Identifier: PMPL-1.0-or-later
# Hypatia neurosymbolic security scanning for selur
name: Hypatia Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 5 * * 1'  # Weekly Monday 05:30 UTC

permissions: read-all

jobs:
  hypatia-scan:
    name: Neurosymbolic Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Run Hypatia scan
        uses: hyperpolymath/hypatia-action@main
        with:
          scan-depth: full
          report-format: sarif
          fail-on-critical: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@6624720a57d4c312633c7b953db2f2da5bcb4c3a  # v3
        with:
          sarif_file: hypatia-results.sarif
        continue-on-error: true
